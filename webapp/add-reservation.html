<!DOCTYPE html>
<html>
<head>
<title>Add Reservation - Staff</title>

<style>
body{margin:0;font-family:Segoe UI;}
.container{display:flex;height:100vh;}
.sidebar{width:250px;background:#1e1e2f;padding:25px;color:white;}
.sidebar h2{color:#0093E9;margin-bottom:30px;}
.sidebar a{display:block;color:#ccc;padding:12px;text-decoration:none;border-radius:6px;margin-bottom:10px;}
.sidebar a:hover{background:#28a745;color:white;}

.main{flex:1;background:#f4f6f9;padding:40px;}
.main h1{font-size:28px;color:#333;margin-bottom:25px;}

form{background:white;padding:30px;border-radius:10px;width:500px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
input,select{width:100%;padding:10px;margin-bottom:15px;border:1px solid #ccc;border-radius:5px;}
button{width:180px;height:40px;background:#28a745;color:white;border:none;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>
<div class="container">

<div class="sidebar">
<h2>Ocean View Resort</h2>
<a href="staff-dashboard.html">Dashboard</a>
<a href="add-reservation.html">Add Reservation</a>
<a href="view-reservation.html">View Reservations</a>
<a href="calculate-bill.html">Calculate Bill</a>
<a href="print-bill.html">Print Bill</a>
<a href="help.html">Help</a>
<a href="login.html">Logout</a>
</div>

<div class="main">
<h1>Add Reservation</h1>

<form>
<input type="text" placeholder="Customer Name">
<input type="text" placeholder="NIC Number">
<input type="text" placeholder="Phone Number">
<select>
<option>Select Room Type</option>
<option>Single Room</option>
<option>Double Room</option>
<option>Deluxe Room</option>
</select>
<input type="date" placeholder="Check-in Date">
<input type="date" placeholder="Check-out Date">
<button>Save Reservation</button>
</form>

</div>
</div>
</body>
</html>
